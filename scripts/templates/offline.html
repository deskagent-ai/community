<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskAgent - Connecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a2e; color: #e5e5e5; }
            .status { color: #a0a0a0; }
            .spinner { border-color: #3a3a4e; border-top-color: #2196f3; }
        }
        .card { text-align: center; padding: 2rem; }
        .spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.5rem;
            border: 3px solid #e5e5e6;
            border-top-color: #2196f3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #343541;
            margin-bottom: 0.75rem;
        }
        @media (prefers-color-scheme: dark) { .title { color: #e5e5e5; } }
        .status { color: #6e6e80; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <div class="title">DeskAgent</div>
        <div class="status" id="status">Waiting for server...</div>
    </div>
    <script>
        // Poll server and reload when ready
        let attempts = 0;
        const statusEl = document.getElementById('status');

        async function checkServer() {
            attempts++;
            try {
                const response = await fetch('/status', { cache: 'no-store' });
                if (response.ok) {
                    // Server running - reload page (main UI will handle the rest)
                    statusEl.textContent = 'Connected! Loading...';
                    setTimeout(() => location.reload(), 200);
                    return;
                }
            } catch (e) {
                // Server not running yet
            }

            statusEl.textContent = attempts > 5
                ? `Waiting for server... (${attempts})`
                : 'Connecting...';

            // Retry every 500ms
            setTimeout(checkServer, 500);
        }

        // Start polling
        checkServer();
    </script>
</body>
</html>
